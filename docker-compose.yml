version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: computer-store-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - computer-store-network
    restart: unless-stopped

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: computer-store-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - computer-store-network
    restart: unless-stopped

  # Optional: SQLite database volume
  db:
    image: alpine:latest
    container_name: computer-store-db
    volumes:
      - ./backend:/app
    networks:
      - computer-store-network
    command: echo "Database volume created"

networks:
  computer-store-network:
    driver: bridge

volumes:
  backend-data:
  frontend-build:
